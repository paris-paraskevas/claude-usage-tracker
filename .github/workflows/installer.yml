name: Build Windows installer

# On each published release: bundle the app with PyInstaller, build a Windows
# installer with Inno Setup, and attach ClaudeUsageTracker-Setup.exe to the release.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  installer:
    runs-on: windows-latest
    permissions:
      contents: write          # upload the release asset
      actions: read            # SignPath reads the unsigned build artifact
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Generate icon
        run: python -c "import claude_usage_tracker as m; m.make_app_icon(256).save('app.ico', sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build standalone app (PyInstaller)
        run: >
          pyinstaller --noconfirm --clean --onedir --noconsole
          --name ClaudeUsageTracker --icon app.ico
          --collect-all webview --collect-all clr_loader --collect-all pythonnet
          --collect-all nacl --collect-all qrcode
          --hidden-import _cffi_backend
          --hidden-import pystray._win32
          claude_usage_tracker.py

      - name: Resolve version
        id: ver
        shell: bash
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build installer (Inno Setup)
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.v }} installer.iss

      # --- Code signing via SignPath (free for open source). ---
      # Inert until you set the repo variable SIGNPATH_ORGANIZATION_ID + secret
      # SIGNPATH_API_TOKEN (and install the SignPath GitHub App). Docs:
      # https://about.signpath.io/product/open-source
      - name: Upload unsigned installer (for SignPath)
        id: unsigned
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: installer-unsigned
          path: dist/ClaudeUsageTracker-Setup.exe

      - name: Sign installer (SignPath)
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: claude-usage-tracker
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist-signed

      - name: Attach installer to the release (signed if available)
        shell: bash
        run: |
          SETUP=dist/ClaudeUsageTracker-Setup.exe
          [ -f dist-signed/ClaudeUsageTracker-Setup.exe ] && SETUP=dist-signed/ClaudeUsageTracker-Setup.exe
          echo "uploading: $SETUP"
          gh release upload "${GITHUB_REF_NAME}" "$SETUP" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
